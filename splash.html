<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verse Splash</title>
  <style>
    :root {
      --bg: #050409;
      --purple: #a855f7;
      --purple-2: #7c3aed;
      --purple-3: #d8b4fe;
      --text: #f7f3ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(168, 85, 247, 0.18), transparent 20%),
        radial-gradient(circle at 80% 12%, rgba(124, 58, 237, 0.16), transparent 22%),
        radial-gradient(circle at 50% 70%, rgba(216, 180, 254, 0.12), transparent 28%),
        linear-gradient(180deg, #030207 0%, #09060e 100%);
      color: var(--text);
    }
    body::before {
      content: "";
      position: fixed;
      inset: -30%;
      background: conic-gradient(from 180deg at 50% 50%, transparent 0deg, rgba(168,85,247,.15) 70deg, transparent 125deg, rgba(216,180,254,.08) 200deg, transparent 250deg, rgba(124,58,237,.14) 310deg, transparent 360deg);
      filter: blur(90px);
      animation: orbit 16s linear infinite;
    }
    @keyframes orbit {
      from { transform: rotate(0deg) scale(1.05); }
      to { transform: rotate(360deg) scale(1.05); }
    }
    .splash {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      transition: opacity .45s ease, transform .45s ease, filter .45s ease;
    }
    .splash.fade-out {
      opacity: 0;
      transform: scale(1.02);
      filter: blur(10px);
    }
    .card {
      width: min(460px, 80vw);
      aspect-ratio: 1.25 / 1;
      border-radius: 36px;
      border: 1px solid rgba(216, 180, 254, 0.18);
      background: linear-gradient(180deg, rgba(18, 14, 30, 0.92), rgba(8, 6, 14, 0.94));
      box-shadow: 0 0 100px rgba(168, 85, 247, 0.18), inset 0 1px 0 rgba(255,255,255,.06);
      display: grid;
      place-items: center;
      backdrop-filter: blur(18px);
    }
    .mark-wrap {
      display: grid;
      place-items: center;
      gap: 18px;
    }
    .mark {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(216, 180, 254, .28);
      background: radial-gradient(circle at 30% 30%, rgba(216,180,254,.22), rgba(168,85,247,.14), rgba(10,8,16,.3));
      box-shadow: 0 0 60px rgba(168,85,247,.34);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); box-shadow: 0 0 60px rgba(168,85,247,.34); }
      50% { transform: scale(1.04); box-shadow: 0 0 90px rgba(168,85,247,.44); }
    }
    .mark svg { width: 72px; height: 72px; }
    .word {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .sub {
      color: #c7b7eb;
      letter-spacing: .24em;
      text-transform: uppercase;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="card">
      <div class="mark-wrap">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="32" r="28" stroke="url(#g1)" stroke-width="2.2"/>
            <path d="M19 18L31.8 46L45 18" stroke="url(#g2)" stroke-width="3.3" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="g1" x1="10" y1="10" x2="56" y2="56">
                <stop stop-color="#d8b4fe"/>
                <stop offset="1" stop-color="#7c3aed"/>
              </linearGradient>
              <linearGradient id="g2" x1="20" y1="18" x2="44" y2="44">
                <stop stop-color="#f5e8ff"/>
                <stop offset="1" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="word">Verse</div>
        <div class="sub">minimal browser</div>
      </div>
    </div>
  </div>
  <script>
    window.verseSplash?.onStartFade(() => {
      document.getElementById('splash').classList.add('fade-out');
    });
  </script>
</body>
</html>
